<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flag Arena Live</title>

<style>
body{
margin:0;
background:radial-gradient(circle,#001a33,#000);
font-family:Arial Black;
color:white;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
#stage{
position:relative;
width:420px;
height:750px;
overflow:hidden;
}
#ring{
position:absolute;
top:46%;
left:50%;
transform:translate(-50%,-50%);
width:330px;
height:330px;
border-radius:50%;
border:12px solid #39ff14;
border-left-color:transparent;
}
.flag{
position:absolute;
width:28px;
height:18px;
background-size:cover;
border:1px solid white;
}
#wheel{
position:absolute;
top:250px;
left:50%;
transform:translateX(-50%);
width:200px;
height:200px;
border-radius:50%;
border:6px solid gold;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
background:#111;
}
#top{
position:absolute;
top:10px;
width:100%;
text-align:center;
}
#status{
font-size:18px;
}
#timer{
color:gold;
}
#leader{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.6);
padding:10px;
width:220px;
text-align:center;
font-size:14px;
border-radius:10px;
}
#map{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
width:260px;
opacity:.9;
}
.country{
fill:#444;
stroke:#111;
stroke-width:0.5;
}
.explosion{
position:absolute;
width:10px;
height:10px;
background:orange;
border-radius:50%;
animation:boom .5s forwards;
}
@keyframes boom{
0%{transform:scale(1);opacity:1}
100%{transform:scale(6);opacity:0}
}
/* Live viewers + chat overlay */
#overlay{
position:absolute;
top:0;
right:0;
width:180px;
height:100%;
pointer-events:none;
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:flex-end;
padding:10px;
}
#viewers{
font-size:16px;
color:#39ff14;
margin-bottom:10px;
}
#chat{
width:100%;
max-height:90%;
overflow:hidden;
display:flex;
flex-direction:column-reverse;
}
.chat-msg{
background:rgba(0,0,0,0.5);
padding:3px 6px;
margin-top:2px;
border-radius:6px;
font-size:12px;
white-space:nowrap;
}
</style>
</head>

<body>
<div id="stage">
<div id="top">
<h2>FLAG ARENA</h2>
<div id="status">Spinning country wheel...</div>
<div id="timer"></div>
</div>

<div id="wheel">?</div>
<div id="ring"></div>

<!-- World heat map -->
<svg id="map" viewBox="0 0 200 100">
<rect class="country" id="us" x="20" y="40" width="20" height="10"/>
<rect class="country" id="br" x="50" y="60" width="15" height="10"/>
<rect class="country" id="fr" x="95" y="40" width="10" height="8"/>
<rect class="country" id="de" x="105" y="40" width="10" height="8"/>
<rect class="country" id="ru" x="120" y="20" width="35" height="10"/>
<rect class="country" id="cn" x="140" y="45" width="20" height="10"/>
<rect class="country" id="jp" x="170" y="45" width="6" height="6"/>
<rect class="country" id="in" x="130" y="60" width="12" height="8"/>
<rect class="country" id="ug" x="110" y="70" width="8" height="6"/>
<rect class="country" id="za" x="110" y="85" width="10" height="6"/>
</svg>

<div id="leader">
<b>Top Winners</b>
<div id="scores"></div>
</div>

<div id="overlay">
<div id="viewers">Live: 1234</div>
<div id="chat"></div>
</div>

</div>

<script>
const countries="us,br,fr,de,jp,cn,ru,ug,za,in".split(",")
let flags=[]
let scores={}
let rotation=0
let radius=150
let roundTime=15000
let start=Date.now()
const stage=document.getElementById("stage")
const status=document.getElementById("status")
const timer=document.getElementById("timer")
const scoreBox=document.getElementById("scores")
const wheel=document.getElementById("wheel")
const viewers=document.getElementById("viewers")
const chat=document.getElementById("chat")
let featured=null

// Fake chat messages pool
const fakeMessages=[
"Brazil is winning!","Go Japan!","USA takes the lead!","Wow Germany!","France strong!","India is here!","China dominates!","Uganda hype!","South Africa rocks!","Russia is unstoppable!"
]

function spinWheel(){
wheel.style.display="flex"
let spins=20
let interval=setInterval(()=>{
featured=countries[Math.floor(Math.random()*countries.length)]
wheel.innerHTML=featured.toUpperCase()
spins--
if(spins<=0){
clearInterval(interval)
status.innerHTML="Featured country: "+featured.toUpperCase()
setTimeout(()=>{
wheel.style.display="none"
spawn()
},1500)
}
},120)
}

function spawn(){
flags.forEach(f=>f.el.remove())
flags=[]
const cx=210
const cy=350
for(let i=0;i<100;i++){
let code=countries[Math.floor(Math.random()*countries.length)]
let el=document.createElement("div")
el.className="flag"
el.style.backgroundImage="url(https://flagcdn.com/w40/"+code+".png)"
stage.appendChild(el)
let speed=16
if(code===featured) speed=10
flags.push({el:el,code:code.toUpperCase(),x:cx,y:cy,vx:(Math.random()-.5)*speed,vy:(Math.random()-.5)*speed,alive:true})
}
start=Date.now()
}

// Fake viewers auto increment
let fakeCount=1200
setInterval(()=>{
fakeCount+=Math.floor(Math.random()*5)
viewers.innerText="Live: "+fakeCount
},2000)

// Fake chat messages
function addFakeMessage(){
let msg=document.createElement("div")
msg.className="chat-msg"
msg.innerText=fakeMessages[Math.floor(Math.random()*fakeMessages.length)]
chat.appendChild(msg)
if(chat.childNodes.length>20){
chat.removeChild(chat.firstChild)
}
setTimeout(addFakeMessage,1500+Math.random()*2000)
}
addFakeMessage()

function boom(x,y){
let e=document.createElement("div")
e.className="explosion"
e.style.left=x+"px"
e.style.top=y+"px"
stage.appendChild(e)
setTimeout(()=>e.remove(),500)
}

function update(){
rotation+=5
document.getElementById("ring").style.transform="translate(-50%,-50%) rotate("+rotation+"deg)"
const cx=210
const cy=350
flags.forEach(f=>{
if(!f.alive) return
f.x+=f.vx
f.y+=f.vy
let dx=f.x-cx
let dy=f.y-cy
let dist=Math.sqrt(dx*dx+dy*dy)
if(dist>radius){
let angle=Math.atan2(dy,dx)*180/Math.PI
if(angle<0) angle+=360
let gap=(rotation+180)%360
let diff=Math.abs(angle-gap)
if(diff<10||diff>350){
f.alive=false
boom(f.x,f.y)
}else{
let nx=dx/dist
let ny=dy/dist
let dot=f.vx*nx+f.vy*ny
f.vx-=2*dot*nx
f.vy-=2*dot*ny
}
}
f.el.style.left=f.x+"px"
f.el.style.top=f.y+"px"
})
timer.innerText="Winner in "+Math.ceil((roundTime-(Date.now()-start))/1000)+"s"
checkWinner()
requestAnimationFrame(update)
}

function checkWinner(){
if(Date.now()-start>roundTime){
let alive=flags.filter(f=>f.alive)
let win=alive[Math.floor(Math.random()*alive.length)]
announce(win.code)
}
}

function announce(code){
status.innerHTML="🏆 Winner: "+code
scores[code]=(scores[code]||0)+1
updateBoard()
updateMap(code.toLowerCase())
speak("Comment your country below. The winner is "+code+". Won by arena luck.")
setTimeout(()=>{
spinWheel()
status.innerHTML="Spinning country wheel..."
},4000)
}

function updateBoard(){
let arr=Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,5)
scoreBox.innerHTML=""
arr.forEach(s=>{
let d=document.createElement("div")
d.innerHTML=s[0]+" — "+s[1]
scoreBox.appendChild(d)
})
}

function updateMap(code){
let c=document.getElementById(code)
if(!c) return
let wins=scores[code.toUpperCase()]
let intensity=Math.min(wins*30,255)
c.style.fill="rgb("+intensity+",80,80)"
}

function speak(t){
let msg=new SpeechSynthesisUtterance(t)
speechSynthesis.cancel()
speechSynthesis.speak(msg)
}

spinWheel()
update()
</script>
</body>
  </html>
